<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能体网关演示</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel sidebar">
        <div class="brand">
          <div class="mark">AG</div>
          <div>
            <h1>智能体网关</h1>
            <p>Go/Gin 多租户智能体后端原型</p>
          </div>
        </div>

        <label>
          租户
          <select id="tenant"></select>
        </label>

        <label>
          用户 ID
          <input id="userId" value="user-001" />
        </label>

        <label>
          会话 ID
          <input id="sessionId" value="sess-demo" />
        </label>

        <div class="model-card">
          <span>当前模型</span>
          <strong id="modelName">loading...</strong>
          <small id="modelProvider"></small>
        </div>

        <button id="modelToggleBtn" type="button" class="wide-btn">切换模型</button>

        <div class="tools">
          <h2>MCP 风格工具</h2>
          <ul id="toolList"></ul>
        </div>
      </section>

      <section class="panel chat">
        <header class="chat-header">
          <div>
            <h2>流式智能体对话</h2>
            <p>观察运行开始、工具调用、工具结果、增量输出和完成事件</p>
          </div>
          <button id="clearBtn" type="button">清空</button>
        </header>

        <div id="timeline" class="timeline"></div>

        <form id="chatForm" class="composer">
          <textarea id="message" rows="3">食べる的て形是什么？顺便看看我的记忆薄弱点</textarea>
          <button id="sendBtn" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
